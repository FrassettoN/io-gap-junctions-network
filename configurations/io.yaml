name: DBBS IO volume
packages:
  - bsb-nest~=6.0
components:
  - nest_models/build_models.py
storage:
  engine: hdf5
  root: networks/io_volume.hdf5
network:
  x: 50
  y: 50
  z: 50
regions:
  inferior_olivary:
    children:
    - io_layer
    type: group
partitions:
  io_layer:
    thickness: 150
cell_types:
  io:
    spatial:
      density: 3.9e-5
      radius: 7.5
    plotting:
      display_name: Inferior olivary cells
placement:
  io_layer_placement:
    strategy: bsb.placement.RandomPlacement
    partitions:
      - io_layer
    cell_types:
      - io
connectivity:
  gap_io:
    strategy: bsb.connectivity.AllToAll
    presynaptic:
      cell_types:
        - io
    postsynaptic:
      cell_types:
        - io

simulations:
  basal_activity:
    seed: 1234
    simulator: nest
    resolution: 0.1
    duration: 5000
    modules:
      - gap_io_module
    cell_models:
      io:
        model: eglif_cond_alpha_multisyn_mod
        constants:
          A1 : 1810.923
          A2 : 1358.197
          C_m : 189
          E_L : -45
          I_e : -18.101
          V_m : -45
          V_reset : -45
          V_th : -35
          k_1 : 0.191
          k_2 : 0.091
          k_adap : 1.928
          t_ref : 1
          tau_m : 11
          E_rev1: 0
          E_rev2: -80
          tau_syn1: 1
          tau_syn2: 60
          E_rev1: 0
          E_rev2: -80

    connection_models:
      gap_io:
        synapses:
          - model: gap_junction
            weight: 4
        rule: one_to_one
        make_symmetric: True
        
    devices:
      cf_stimulus:
        delay: 0.1
        device: poisson_generator
        rate: 0
        receptor_type: 1
        start: 0
        stop: 500.0
        targetting:
          strategy: cell_model
          cell_models:
          - io
        weight: 50

      io_record:
        device: spike_recorder
        delay: 0.1
        targetting:
          strategy: cell_model
          cell_models:
            - io
            
      io_Vm_record:
        device: multimeter
        delay: 0.1
        properties:
          - V_m
        units:
          - mV
        targetting:
          strategy: cell_model
          cell_models:
            - io